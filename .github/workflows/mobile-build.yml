name: mobile-build

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Student repo URL to clone"
        required: true
      branch:
        description: "Branch to build"
        required: true
        default: "main"
      language:
        description: "Language (kotlin/java/swift)"
        required: true
        default: "kotlin"
      build_command:
        description: "Build command to run"
        required: true
        default: "./gradlew assembleDebug"
      test_command:
        description: "Test command to run after build"
        required: false
        default: "./gradlew test"
      expected_output_file:
        description: "Expected APK/output path relative to repo root"
        required: false
        default: "app/build/outputs/apk/debug/app-debug.apk"
      job_id:
        description: "Unique job ID to correlate the result"
        required: true
      webhook_url:
        description: "URL to POST the result back to"
        required: true
      harness_id:
        description: "Harness ID to inject (empty = skip injection)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Clone student repo
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.branch }}" \
            "${{ github.event.inputs.repo_url }}" student-repo

      - name: Patch settings.gradle
        run: |
          SETTINGS="student-repo/settings.gradle"
          if [ -f "$SETTINGS" ]; then
            python3 - <<'PYEOF'
import re

path = "student-repo/settings.gradle"
content = open(path).read()

# Fix repository mode
content = content.replace(
    "RepositoriesMode.FAIL_ON_PROJECT_REPOS",
    "RepositoriesMode.PREFER_SETTINGS"
)

# Inject jitpack into the dependencyResolutionManagement repositories block
content = re.sub(
    r'(dependencyResolutionManagement\b.*?repositories\s*\{)',
    r'\1\n        maven { url "https://jitpack.io" }',
    content,
    flags=re.DOTALL
)

open(path, "w").write(content)
print("=== settings.gradle after patch ===")
print(content)
PYEOF
          fi

          SETTINGS_KTS="student-repo/settings.gradle.kts"
          if [ -f "$SETTINGS_KTS" ]; then
            python3 - <<'PYEOF'
import re

path = "student-repo/settings.gradle.kts"
content = open(path).read()

content = content.replace(
    "RepositoriesMode.FAIL_ON_PROJECT_REPOS",
    "RepositoriesMode.PREFER_SETTINGS"
)

content = re.sub(
    r'(dependencyResolutionManagement\b.*?repositories\s*\{)',
    r'\1\n        maven(url = "https://jitpack.io")',
    content,
    flags=re.DOTALL
)

open(path, "w").write(content)
print("=== settings.gradle.kts after patch ===")
print(content)
PYEOF
          fi

      - name: Inject harness tests
        env:
          HARNESS_TOKEN: ${{ secrets.HARNESS_TOKEN }}
        run: |
          HARNESS_ID="${{ github.event.inputs.harness_id }}"
          LANGUAGE="${{ github.event.inputs.language }}"

          if [ -z "$HARNESS_ID" ]; then
            echo "No harness_id — skipping"
            exit 0
          fi

          BASE_URL="https://raw.githubusercontent.com/code-abcodes/mobile-harnesses/main"

          case "$LANGUAGE" in
            kotlin)
              DEST="student-repo/app/src/test/java/com/harness"
              mkdir -p "$DEST"
              curl -f -s \
                -H "Authorization: Bearer $HARNESS_TOKEN" \
                "$BASE_URL/kotlin/${HARNESS_ID}.kt" \
                -o "$DEST/HarnessTest.kt"
              echo "Injected kotlin harness: $HARNESS_ID"
              ;;
            java)
              DEST="student-repo/app/src/test/java/com/harness"
              mkdir -p "$DEST"
              curl -f -s \
                -H "Authorization: Bearer $HARNESS_TOKEN" \
                "$BASE_URL/java/${HARNESS_ID}.java" \
                -o "$DEST/HarnessTest.java"
              echo "Injected java harness: $HARNESS_ID"
              ;;
            swift)
              echo "Swift harness injection not yet implemented"
              ;;
          esac
        run: |
          LANGUAGE="${{ github.event.inputs.language }}"
          case "$LANGUAGE" in
            kotlin) IMAGE="codedabtech/abccodes-runner-kotlin" ;;
            java)   IMAGE="codedabtech/abccodes-runner-java" ;;
            swift)  IMAGE="codedabtech/abccodes-runner-swift" ;;
            *)      IMAGE="codedabtech/abccodes-runner-kotlin" ;;
          esac
          echo "RUNNER_IMAGE=$IMAGE" >> $GITHUB_ENV
          docker pull "$IMAGE"

      - name: Run build
        id: run_build
        run: |
          set +e
          OUTPUT=$(docker run --rm \
            -v ${{ github.workspace }}/student-repo:/workspace \
            -w /workspace \
            "$RUNNER_IMAGE" \
            sh -c "chmod +x gradlew 2>/dev/null || true && \
              ${{ github.event.inputs.build_command }}" 2>&1)
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "$OUTPUT" > /tmp/build_output.txt

      - name: Debug build output
        if: always()
        run: cat /tmp/build_output.txt

      - name: Run tests
        id: run_tests
        if: steps.run_build.outputs.exit_code == '0'
        run: |
          set +e
          TEST_CMD="${{ github.event.inputs.test_command }}"
          if [ -z "$TEST_CMD" ]; then
            TEST_CMD="./gradlew test"
          fi
          TEST_OUTPUT=$(docker run --rm \
            -v ${{ github.workspace }}/student-repo:/workspace \
            -w /workspace \
            "$RUNNER_IMAGE" \
            sh -c "chmod +x gradlew 2>/dev/null || true && $TEST_CMD" 2>&1)
          TEST_EXIT=$?
          set -e
          echo "exit_code=$TEST_EXIT" >> $GITHUB_OUTPUT
          echo "$TEST_OUTPUT" >> /tmp/build_output.txt
          echo "--- Test output ---"
          echo "$TEST_OUTPUT"

      - name: Check expected output file
        id: check_output
        if: steps.run_build.outputs.exit_code == '0'
        run: |
          EXPECTED="${{ github.event.inputs.expected_output_file }}"
          if [ -z "$EXPECTED" ]; then
            echo "output_found=true" >> $GITHUB_OUTPUT
          elif docker run --rm \
            -v ${{ github.workspace }}/student-repo:/workspace \
            -w /workspace \
            "$RUNNER_IMAGE" \
            sh -c "test -f '$EXPECTED'"; then
            echo "output_found=true" >> $GITHUB_OUTPUT
            echo "Output file found at $EXPECTED"
          else
            echo "output_found=false" >> $GITHUB_OUTPUT
            echo "Output file NOT found at $EXPECTED"
            docker run --rm \
              -v ${{ github.workspace }}/student-repo:/workspace \
              -w /workspace \
              "$RUNNER_IMAGE" \
              sh -c "find app/build/outputs -name '*.apk' 2>/dev/null || echo 'no APK files found'" \
              >> /tmp/build_output.txt || true
          fi

      - name: Post result to webhook
        if: always()
        run: |
          BUILD_EXIT="${{ steps.run_build.outputs.exit_code }}"
          BUILD_EXIT="${BUILD_EXIT:-1}"
          TEST_EXIT="${{ steps.run_tests.outputs.exit_code }}"
          if [ -z "$TEST_EXIT" ]; then
            TEST_EXIT="-1"
          fi
          OUTPUT_FOUND="${{ steps.check_output.outputs.output_found }}"
          if [ -z "$OUTPUT_FOUND" ]; then
            OUTPUT_FOUND="false"
          fi

          python3 - <<PYEOF
          import json, subprocess, os

          build_exit    = int("$BUILD_EXIT")
          test_exit     = int("$TEST_EXIT")
          output_found  = "$OUTPUT_FOUND" == "true"
          output        = open("/tmp/build_output.txt").read() if os.path.exists("/tmp/build_output.txt") else "no output captured"

          payload = json.dumps({
              "jobId":         "${{ github.event.inputs.job_id }}",
              "success":       build_exit == 0 and test_exit in (0, -1) and output_found,
              "exitCode":      build_exit,
              "testExitCode":  test_exit,
              "outputFound":   output_found,
              "output":        output,
          })

          result = subprocess.run(
              ["curl", "-s", "-X", "POST",
               "${{ github.event.inputs.webhook_url }}",
               "-H", "Content-Type: application/json",
               "-d", payload],
              capture_output=True, text=True
          )
          print("webhook response:", result.stdout, result.stderr)
          PYEOF