name: mobile-build

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Student repo URL to clone"
        required: true
      branch:
        description: "Branch to build"
        required: true
        default: "main"
      language:
        description: "Language (kotlin/java/swift)"
        required: true
        default: "kotlin"
      build_command:
        description: "Build command to run"
        required: true
        default: "./gradlew assembleDebug"
      job_id:
        description: "Unique job ID to correlate the result"
        required: true
      webhook_url:
        description: "URL to POST the result back to"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Clone student repo
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.branch }}" \
            "${{ github.event.inputs.repo_url }}" student-repo
        continue-on-error: false

      - name: Pull runner image
        run: |
          LANGUAGE="${{ github.event.inputs.language }}"
          case "$LANGUAGE" in
            kotlin) IMAGE="codedabtech/abccodes-runner-kotlin" ;;
            java)   IMAGE="codedabtech/abccodes-runner-java" ;;
            swift)  IMAGE="codedabtech/abccodes-runner-swift" ;;
            *)      IMAGE="codedabtech/abccodes-runner-kotlin" ;;
          esac
          echo "RUNNER_IMAGE=$IMAGE" >> $GITHUB_ENV
          docker pull "$IMAGE"

      - name: Run build
        id: run_build
        run: |
          set +e
          OUTPUT=$(docker run --rm \
            -v ${{ github.workspace }}/student-repo:/workspace \
            -w /workspace \
            "$RUNNER_IMAGE" \
            sh -c "chmod +x gradlew 2>/dev/null || true && ${{ github.event.inputs.build_command }}" 2>&1)
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "$OUTPUT" > /tmp/build_output.txt
          echo "Build exit code: $EXIT_CODE"
          echo "--- Build output ---"
          cat /tmp/build_output.txt

      - name: Post result to webhook
        if: always()
        run: |
          RAW_EXIT="${{ steps.run_build.outputs.exit_code }}"
          EXIT_CODE="${RAW_EXIT:-1}"

          OUTPUT=$(cat /tmp/build_output.txt 2>/dev/null || echo "build step did not produce output")

          python3 - <<PYEOF
          import json, subprocess, sys

          exit_code = int("$EXIT_CODE")
          success   = exit_code == 0
          output    = open("/tmp/build_output.txt").read() if __import__("os").path.exists("/tmp/build_output.txt") else "no output captured"

          payload = json.dumps({
              "jobId":    "${{ github.event.inputs.job_id }}",
              "success":  success,
              "exitCode": exit_code,
              "output":   output,
          })

          result = subprocess.run(
              ["curl", "-s", "-X", "POST",
               "${{ github.event.inputs.webhook_url }}",
               "-H", "Content-Type: application/json",
               "-d", payload],
              capture_output=True, text=True
          )
          print("webhook response:", result.stdout, result.stderr)
          PYEOF